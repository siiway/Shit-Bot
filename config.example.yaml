# ─── Platform credentials & global settings ───────────────────────────────────

discord:
  enabled: false
  token: YOUR_DISCORD_BOT_TOKEN
  embedColor: "#1DA1F2"

telegram:
  enabled: true
  token: YOUR_TELEGRAM_BOT_TOKEN
  parseMode: HTML
  apiRoot: ""

twitter:
  enabled: true          # 设为 false 可关闭推文监控, 只跑 AI 聊天 / WebUI
  authToken: ""
  ct0: ""
  username: ""
  password: ""
  email: ""
  totpSecret: ""

webui:
  enabled: true
  port: 3000
  host: "0.0.0.0"
  password: ""

ai:
  enabled: false
  apiUrl: https://api.openai.com/v1
  apiKey: ""
  model: gpt-3.5-turbo
  systemPrompt: "你是一个有帮助的助手。"
  maxTokens: 1024
  temperature: 0.7
  allowedGuildIds: []
  maxToolIterations: 8
  reactions: true          # 让模型在最终回复里返回 emoji 短码, 给用户消息贴表情反应
  webSearch:
    enabled: false
    provider: duckduckgo   # duckduckgo | tavily | serper | brave | searxng
    apiKey: ""             # tavily / serper / brave 需要
    baseUrl: ""            # searxng 实例地址
    maxResults: 5
  memory:
    enabled: false
    maxProfileItems: 12      # 每轮强制注入的画像最多取几条(按权重)
    maxProfileChars: 800     # 画像字符上限
    recentTurns: 6           # 每轮自动附带的最近对话条数(连续性), 0 关闭
    recallLimit: 8           # recall_memory 按需检索时每类返回的条数
    logConversations: true
    maxConversationsPerUser: 500
  summary:
    enabled: false              # @机器人 "总结一下上面的200条消息" 时生效
    maxMessagesPerChannel: 500  # 每个频道滚动保留的消息数(也是可总结的上限)
    defaultCount: 100           # 未指定条数时默认总结多少条

enableApproval: true
sendAsImage: true
xToImageApiUrl: ""
xToImageApiToken: ""
xToImageApiTheme: dark
imageCacheTtlMinutes: 60
pollIntervalMinutes: 5
maxPostsPerFetch: 20
maxTweetAgeMinutes: 60

# ─── Groups (required) ────────────────────────────────────────────────────────
# Each group has its own users, target channels, and approval settings.

groups:
  - name: my-group
    users:
      - username: elonmusk
        displayName: Elon
        filters:
          keywords:
            include: [tesla, spacex]
          excludeRetweets: true
      - username: RhenCloud_
        displayName: RhenCloud
        filters:
          keywords:
            include: []
            exclude: []
          media:
            requireMedia: false
    discord:
      channelId: "1234567890"
      r14ChannelId: "1234567891"
    telegram:
      chatId: "-1001234567890"
      targets:
        r14:
          chatId: "-100_R14_CHAT_ID"
    approval:
      discordAdminChannelId: "1234567892"
      discordApproveRoleId: "1234567893"
      telegramAdminChatIds:
        - "111111111"

  - name: another-group
    users:
      - username: spacex
        displayName: SpaceX
        filters: {}
    discord:
      channelId: "9876543210"
