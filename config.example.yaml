# ─── Platform credentials & global settings ───────────────────────────────────

discord:
  enabled: false
  token: YOUR_DISCORD_BOT_TOKEN
  embedColor: "#1DA1F2"

telegram:
  enabled: true
  token: YOUR_TELEGRAM_BOT_TOKEN
  parseMode: HTML
  apiRoot: ""

twitter:
  authToken: ""
  ct0: ""
  username: ""
  password: ""
  email: ""
  totpSecret: ""

webui:
  enabled: true
  port: 3000
  host: "0.0.0.0"
  password: ""

ai:
  enabled: false
  apiUrl: https://api.openai.com/v1
  apiKey: ""
  model: gpt-3.5-turbo
  systemPrompt: "你是一个有帮助的助手。"
  maxTokens: 1024
  temperature: 0.7
  allowedGuildIds: []

enableApproval: true
sendAsImage: true
xToImageApiUrl: ""
xToImageApiToken: ""
xToImageApiTheme: dark
imageCacheTtlMinutes: 60
pollIntervalMinutes: 5
maxPostsPerFetch: 20
maxTweetAgeMinutes: 60

# ─── Groups (required) ────────────────────────────────────────────────────────
# Each group has its own users, target channels, and approval settings.

groups:
  - name: my-group
    users:
      - username: elonmusk
        displayName: Elon
        filters:
          keywords:
            include: [tesla, spacex]
          excludeRetweets: true
      - username: RhenCloud_
        displayName: RhenCloud
        filters:
          keywords:
            include: []
            exclude: []
          media:
            requireMedia: false
    discord:
      channelId: "1234567890"
      r14ChannelId: "1234567891"
    telegram:
      chatId: "-1001234567890"
      targets:
        r14:
          chatId: "-100_R14_CHAT_ID"
    approval:
      discordAdminChannelId: "1234567892"
      discordApproveRoleId: "1234567893"
      telegramAdminChatIds:
        - "111111111"

  - name: another-group
    users:
      - username: spacex
        displayName: SpaceX
        filters: {}
    discord:
      channelId: "9876543210"
